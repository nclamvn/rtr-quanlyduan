        sync: false
    plan: free

  - type: cron
    name: rtr-forecast-agent
    runtime: node
    region: singapore
    schedule: "0 23 * * *"
    buildCommand: npm install
    startCommand: node src/intelligence/runForecast.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    plan: free

  - type: cron
    name: rtr-brief-weekly
    runtime: node
    region: singapore
    schedule: "0 15 * * 0"
    buildCommand: npm install
    startCommand: node src/intelligence/runBrief.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
